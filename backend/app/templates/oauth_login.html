<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accuro — Inloggen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2rem; width: 100%; max-width: 360px; }
    h1 { font-size: 1.25rem; margin-bottom: .25rem; }
    .sub { color: #666; font-size: .875rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: .875rem; margin-bottom: .25rem; color: #333; }
    input[type=email], input[type=password] { width: 100%; padding: .5rem .75rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; margin-bottom: 1rem; }
    input[type=email]:focus, input[type=password]:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,.2); }
    button { width: 100%; padding: .625rem; background: #4f46e5; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #4338ca; }
    .error { background: #fee2e2; color: #b91c1c; border-radius: 4px; padding: .5rem .75rem; margin-bottom: 1rem; font-size: .875rem; }
    footer { text-align: center; color: #999; font-size: .75rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Accuro</h1>
    <p class="sub">Inloggen voor <strong>{{ client_name }}</strong></p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/oauth/authorize">
      <input type="hidden" name="client_id" value="{{ client_id }}" />
      <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}" />
      <input type="hidden" name="state" value="{{ state }}" />
      <input type="hidden" name="scope" value="{{ scope }}" />

      <label for="email">E-mailadres</label>
      <input type="email" id="email" name="email" required autofocus />

      <label for="password">Wachtwoord</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">Inloggen</button>
    </form>

    <footer>&copy; {{ year }} Accuro</footer>
  </div>
</body>
</html>
