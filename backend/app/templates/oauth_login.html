<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accuro — Inloggen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f9fafb;
      background-image:
        linear-gradient(rgba(37,99,235,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #111827;
    }

    .wrapper {
      width: 100%;
      max-width: 384px;
      padding: 1rem;
      animation: slide-up 0.4s ease both;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
      justify-content: center;
    }
    .logo-icon {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.75rem;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.125rem;
      font-weight: 700;
      color: #2563eb;
      flex-shrink: 0;
    }
    .logo-name {
      font-size: 1.25rem;
      font-weight: 600;
      color: #111827;
      letter-spacing: -0.025em;
    }

    /* Card */
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      padding: 2rem;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #d1d5db; }

    .card-sub {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 1.25rem;
    }
    .card-sub strong {
      color: #374151;
      font-weight: 500;
    }

    /* Form */
    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.375rem;
    }

    input[type=email],
    input[type=password] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input[type=email]::placeholder,
    input[type=password]::placeholder { color: #9ca3af; }
    input[type=email]:hover,
    input[type=password]:hover { border-color: #9ca3af; }
    input[type=email]:focus,
    input[type=password]:focus {
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.5);
    }

    /* Error */
    .error {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
      border-radius: 0.375rem;
      padding: 0.625rem 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
    .error-icon { flex-shrink: 0; margin-top: 1px; }

    /* Button */
    button[type=submit] {
      width: 100%;
      height: 2.5rem;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    button[type=submit]:hover { background: #3b82f6; }
    button[type=submit]:active { background: #1d4ed8; }
    button[type=submit]:disabled { opacity: 0.5; cursor: not-allowed; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: none;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .loading .spinner { display: block; }
    .loading .btn-label { display: none; }

    /* Footer */
    footer {
      text-align: center;
      font-family: ui-monospace, 'Cascadia Code', monospace;
      font-size: 0.625rem;
      color: #9ca3af;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo">
      <div class="logo-icon">A</div>
      <span class="logo-name">Accuro</span>
    </div>

    <div class="card">
      <p class="card-sub">Inloggen voor toegang tot <strong>{{ client_name }}</strong></p>

      {% if error %}
      <div class="error">
        <svg class="error-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#f87171" stroke-width="1.5"/>
          <path d="M8 5v3.5M8 11h.01" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/oauth/authorize" id="login-form">
        <input type="hidden" name="client_id" value="{{ client_id }}" />
        <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}" />
        <input type="hidden" name="state" value="{{ state }}" />
        <input type="hidden" name="scope" value="{{ scope }}" />
        <input type="hidden" name="code_challenge" value="{{ code_challenge }}" />
        <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method }}" />

        <div class="field">
          <label for="email">E-mailadres</label>
          <input type="email" id="email" name="email" required autofocus autocomplete="email" placeholder="naam@bedrijf.nl" />
        </div>

        <div class="field">
          <label for="password">Wachtwoord</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••••••" />
        </div>

        <button type="submit" id="submit-btn">
          <span class="spinner"></span>
          <span class="btn-label">Inloggen</span>
        </button>
      </form>
    </div>

    <footer>Accuro &copy; {{ year }}</footer>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function() {
      document.getElementById('submit-btn').classList.add('loading');
      document.getElementById('submit-btn').disabled = true;
    });
  </script>
</body>
</html>
