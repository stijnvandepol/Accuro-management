name: "CD: Deploy naar Productie"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  COMPOSE_CMD: docker compose -f docker-compose.yml -f docker-compose.prod.yml

jobs:
  deploy:
    name: "Applicatie deployen"
    runs-on: self-hosted
    environment: ${{ github.event.inputs.environment || 'production' }}
    timeout-minutes: 15

    steps:
      - name: Bestaande .env veiligstellen
        run: |
          if [ -f .env ]; then
            cp .env /tmp/.env.backup
            echo "Bestaande .env opgeslagen als backup"
          fi

      - name: Code ophalen
        uses: actions/checkout@v4
        with:
          clean: true

      - name: .env herstellen
        run: |
          if [ -f /tmp/.env.backup ]; then
            cp /tmp/.env.backup .env
            rm /tmp/.env.backup
            echo "Bestaande .env hersteld"
          else
            echo "Geen bestaande .env gevonden — maak er handmatig een aan op de server"
            exit 1
          fi

      - name: Docker images bouwen
        run: $COMPOSE_CMD build

      - name: Applicatie stoppen (volumes behouden)
        run: $COMPOSE_CMD down

      - name: Applicatie starten
        run: $COMPOSE_CMD up -d

      - name: Wachten op health checks
        run: |
          echo "Waiting for services to become healthy..."
          timeout 120 bash -c '
            until $COMPOSE_CMD ps --format json | \
              python3 -c "
          import sys, json
          services = [json.loads(line) for line in sys.stdin if line.strip()]
          unhealthy = [s[\"Service\"] for s in services if s.get(\"Health\") not in (\"healthy\", \"\", None)]
          if unhealthy:
              print(f\"Waiting on: {unhealthy}\")
              sys.exit(1)
          print(\"All services healthy\")
          "; do
              sleep 5
            done
          '

      - name: Draaiende services tonen
        if: always()
        run: $COMPOSE_CMD ps

      - name: Logs tonen bij fout
        if: failure()
        run: $COMPOSE_CMD logs --tail=50
