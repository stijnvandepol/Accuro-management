name: agency-os

# ─── Services ─────────────────────────────────────────────────────────────────

services:

  # ── Database migrations (runs once at startup, then exits) ───────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: agency_migrate
    environment:
      DATABASE_URL: "postgresql://app:${POSTGRES_PASSWORD}@db:5432/app"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-admin@admin.com}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-admin123!}"
      SEED_ADMIN_NAME: "${SEED_ADMIN_NAME:-Admin}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agency_net
    restart: "no"

  # ── Next.js web application ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agency_web
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://app:${POSTGRES_PASSWORD}@db:5432/app"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      INTERNAL_API_KEY: "${INTERNAL_API_KEY}"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      NODE_ENV: "production"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - agency_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Background worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: agency_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://app:${POSTGRES_PASSWORD}@db:5432/app"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      NODE_ENV: "production"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - agency_net

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: agency_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agency_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agency_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - agency_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: agency_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - agency_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ─── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    name: agency_postgres_data
  redis_data:
    name: agency_redis_data

# ─── Networks ─────────────────────────────────────────────────────────────────

networks:
  agency_net:
    name: agency_net
    driver: bridge
